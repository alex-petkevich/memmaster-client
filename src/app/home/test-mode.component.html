<div *ngIf="!finished && currentCard" class="card-wrapper d-flex justify-content-center align-items-center">
  <div class="flashcard d-flex flex-column align-items-stretch" [style.background-color]="currentCard.color || null">
    <div role="status" aria-live="polite" class="visually-hidden">{{ ariaMessage }}</div>

    <!-- top row: Q left and time/fails right -->
    <div class="d-flex w-100 justify-content-between mb-3">
      <div class="text-start">❓{{ index + 1 }} / {{ cards.length }}</div>
      <div class="text-end d-flex gap-3">
        <div>{{ 'home.learn.fails-left' | translate }}: {{ (3 - fails) > 0 ? (3 - fails) : 0 }}</div>
      </div>
    </div>

    <div class="flashcard-name mb-3 text-center"><span class="card-name-text">{{ currentCard.name }}</span></div>

    <div class="mt-2 options-container">
      <div class="d-grid gap-2">
         <button *ngFor="let opt of options" type="button" class="btn btn-w"
                 [ngClass]="{
                   'btn-outline-secondary': !feedback,
                   'btn-success': feedback === 'correct' && opt === (currentCard.value?.toString()),
                   'btn-danger': feedback === 'incorrect' && selectedOption === opt && opt !== (currentCard.value?.toString())
                 }"
                 (click)="onChoose(opt)" [disabled]="!!feedback">{{ opt }}</button>
      </div>
    </div>
    <div class="mt-2">{{ 'home.learn.time' | translate }}: <b>{{ timeLeft }}</b>s</div>


  </div>
</div>

<div *ngIf="finished" class="hint-box text-center mt-5">
  <i class="fas fa-flag-checkered fa-2x text-primary mb-3"></i>
  <p class="fs-5">{{ 'home.learn.aria.finished.test' | translate:{score: score, fails: fails} }}</p>
  <div class="mt-3"><button class="btn btn-primary btn-sm" (click)="onRetry()">{{ 'home.learn.retry-test' | translate }}</button></div>
</div>
