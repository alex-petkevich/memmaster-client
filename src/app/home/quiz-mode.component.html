<div *ngIf="!finished && currentCard" class="card-wrapper d-flex justify-content-center align-items-center">
  <div class="flashcard d-flex flex-column align-items-stretch" [style.background-color]="currentCard.color || null">
    <div role="status" aria-live="polite" class="visually-hidden">{{ ariaMessage }}</div>

    <!-- top row: Q (left) and Score (right) -->
    <div class="d-flex w-100 justify-content-between mb-3">
      <div class="text-start">❓{{ index + 1 }} / {{ cards.length }}</div>
      <div class="text-end">{{ 'home.learn.score' | translate }}: {{ score }}</div>
    </div>

    <!-- card main area -->
    <div class="flashcard-name mb-3 text-center"><span class="card-name-text">{{ currentCard.name }}</span></div>

    <!-- answer options inside the box -->
    <div class="mt-2 w-100">
      <div class="d-grid gap-2">
        <button *ngFor="let opt of options" type="button" class="btn btn-w"
                [ngClass]="{
                  'btn-outline-secondary': !locked,
                  'btn-success': locked && opt === (currentCard.value?.toString()),
                  'btn-danger': locked && selectedOption === opt && opt !== (currentCard.value?.toString())
                }"
                (click)="onChoose(opt)" [disabled]="locked">{{ opt }}</button>
      </div>
    </div>
  </div>
</div>

<div *ngIf="finished" class="hint-box text-center mt-5">
  <i class="fas fa-clipboard-check fa-2x text-primary mb-3"></i>
  <p class="fs-5">{{ 'home.learn.aria.finished.quiz' | translate:{score: score, total: cards.length} }}</p>
  <div class="mt-3"><button class="btn btn-primary btn-sm" (click)="onRetry()">{{ 'home.learn.retry-quiz' | translate }}</button></div>
</div>
